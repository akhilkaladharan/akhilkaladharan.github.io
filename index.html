<!-- HEADER WITH FLOATING DEVOPS ICONS -->
<header>
  <div class="profile-container">

    <!-- Profile Image -->
    <img src="images/profile.jpg" alt="Akhil K" class="profile-pic">

    <!-- Floating DevOps Icons -->
    <img src="images/docker.png" class="icon icon1" alt="Docker">
    <img src="images/aws.png" class="icon icon2" alt="AWS">
    <img src="images/jenkins.png" class="icon icon3" alt="Jenkins">
    <img src="images/ansible.png" class="icon icon4" alt="Ansible">

  </div>

  <h1>Akhil K</h1>
  <p id="typing"></p>
  <a href="#projects" class="btn">View My Work</a>
  <a href="resume.pdf" download class="btn">Download Resume</a>
</header>

<style>

/* HEADER */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1e293b, #020617);
  text-align: center;
}

/* PROFILE CONTAINER */
.profile-container {
  position: relative;
  width: 160px;
  height: 160px;
  margin-bottom: 20px;
}

/* PROFILE IMAGE */
.profile-pic {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #38bdf8;
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
  box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
}

/* ICONS */
.icon {
  width: 40px;
  position: absolute;
  animation: float 4s infinite ease-in-out;
}

/* ICON POSITIONS */
.icon1 { top: -10px; left: 50%; transform: translateX(-50%); }
.icon2 { right: -15px; top: 50%; transform: translateY(-50%); }
.icon3 { bottom: -10px; left: 50%; transform: translateX(-50%); }
.icon4 { left: -15px; top: 50%; transform: translateY(-50%); }

/* FLOAT ANIMATION */
@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* TEXT */
header h1 {
  font-size: 50px;
  margin-top: 10px;
}

#typing {
  color: #94a3b8;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: #38bdf8;
  color: black;
  border-radius: 25px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
  transform: scale(1.1);
}

</style>

<script>
/* Typing Effect */
const text = "DevOps Engineer | AWS | Docker | Jenkins | Ansible";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}
typeEffect();
</script>
